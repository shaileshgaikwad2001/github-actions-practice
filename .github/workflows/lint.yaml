# What is the goal of your workflow
# Goal: Whenever someone changes the python code,
# the linter will check if the syntax. format, indentation (linting) is correct or not

name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    # this steps will automaticcaly clone the code of the current branch into the runner
    steps:
      - name: Checkout/Clone the code
        uses: actions/checkout@v4
      
      - name: Install Linter
        run: pip install ruff
        
